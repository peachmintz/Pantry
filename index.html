<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="pantry">
  <meta name="theme-color" content="#FDF8F3">
  <title>pantry</title>
  <link rel="icon" type="image/png" href="assets/icon.png">
  <link rel="apple-touch-icon" href="assets/icon.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Header: truly full-width. No constraining wrapper on the element itself. -->
  <header class="app-header" id="appHeader">
    <img src="assets/icon.png" alt="pantry" class="header-icon">
  </header>

  <!-- Main content area -->
  <main class="app-main" id="appMain"></main>

  <!-- Bottom nav: full-width. Tab order: Home, Meals, Log (centre), Calendar, Profile -->
  <nav class="bottom-nav" id="bottomNav">
    <button class="nav-btn active" data-tab="home" aria-label="Home">
      <!-- House -->
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/>
        <polyline points="9 21 9 12 15 12 15 21"/>
      </svg>
      <span>Home</span>
    </button>

    <button class="nav-btn nav-btn-meals" data-tab="meals" aria-label="Meals">
      <!-- Bowl / plate with steam -->
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="2" y1="5" x2="22" y2="5"/>
        <path d="M4 5c0 7 3 12 8 12s8-5 8-12"/>
        <line x1="8" y1="19" x2="16" y2="19"/>
      </svg>
      <span>Meals</span>
    </button>

    <button class="nav-btn nav-btn-center" data-tab="log" aria-label="Log">
      <!-- Plus in rounded square — primary action -->
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="4"/>
        <path d="M8 12h8M12 8v8"/>
      </svg>
      <span>Log</span>
    </button>

    <button class="nav-btn" data-tab="calendar" aria-label="Calendar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      <span>Calendar</span>
    </button>

    <button class="nav-btn" data-tab="profile" aria-label="Profile">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      <span>Profile</span>
    </button>
  </nav>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Sheet backdrop -->
  <div class="sheet-backdrop" id="sheetBackdrop"></div>

  <!-- Bottom sheet -->
  <div class="sheet" id="sheet">
    <div class="sheet-header">
      <span class="sheet-title" id="sheetTitle"></span>
      <button class="sheet-close" id="sheetClose" aria-label="Close">&times;</button>
    </div>
    <div class="sheet-body" id="sheetBody"></div>
  </div>

  <!-- Confirm dialog -->
  <div class="confirm-backdrop" id="confirmBackdrop" hidden>
    <div class="confirm-dialog">
      <p class="confirm-title" id="confirmTitle"></p>
      <p class="confirm-msg" id="confirmMsg"></p>
      <div class="confirm-btns">
        <button class="btn btn-ghost" id="confirmCancel">Cancel</button>
        <button class="btn btn-danger" id="confirmOk">Confirm</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
